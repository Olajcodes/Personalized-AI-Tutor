services:
  - type: web
    name: mastery-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ENV
        value: prod

  - type: web
    name: mastery-ai-core
    runtime: docker
    dockerfilePath: ./ai_core/Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    plan: free
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: VECTOR_INDEX_NAME
        sync: false
