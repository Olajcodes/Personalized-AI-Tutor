services:
  postgres:
    image: postgres:16-alpine
    container_name: mastery-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mastery_ai
    ports:
      - "55432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mastery_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mastery-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.26-community
    container_name: mastery-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/olayiwola}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: mastery-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    profiles: ["fullstack"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mastery-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/mastery_ai}
      ENV: ${ENV:-dev}
      AI_CORE_BASE_URL: ${AI_CORE_BASE_URL:-http://ai-core:10001}
      AI_CORE_TIMEOUT_SECONDS: ${AI_CORE_TIMEOUT_SECONDS:-40}
      AI_CORE_ALLOW_FALLBACK: ${AI_CORE_ALLOW_FALLBACK:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:4173}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-olayiwola}
      USE_NEO4J_GRAPH: ${USE_NEO4J_GRAPH:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-MasteryAI}
      INTERNAL_GRAPH_BASE_URL: ${INTERNAL_GRAPH_BASE_URL:-http://backend:8001/api/v1/internal/graph}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    command: >
      sh -c "python -m alembic -c backend/alembic.ini upgrade head &&
      python -m uvicorn backend.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  ai-core:
    profiles: ["fullstack"]
    build:
      context: .
      dockerfile: ai_core/Dockerfile
    container_name: mastery-ai-core
    restart: unless-stopped
    env_file:
      - ai_core/.env
    environment:
      PORT: ${AI_CORE_PORT:-10001}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://postgres:postgres@postgres:5432/mastery_ai}
      DATABASE_URL: ${DATABASE_URL:-}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-MasteryAI}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-olayiwola}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_INTERNAL_POSTGRES_URL: ${BACKEND_INTERNAL_POSTGRES_URL:-http://backend:8001/api/v1/internal/postgres}
      BACKEND_INTERNAL_GRAPH_CONTEXT_URL: ${BACKEND_INTERNAL_GRAPH_CONTEXT_URL:-http://backend:8001/api/v1/internal/graph/context}
      BACKEND_INTERNAL_RAG_URL: ${BACKEND_INTERNAL_RAG_URL:-http://backend:8001/api/v1/internal/rag/retrieve}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      backend:
        condition: service_started
    command: >
      sh -c "python -m uvicorn ai_core.main:app --host 0.0.0.0 --port 10001"
    ports:
      - "10001:10001"

volumes:
  postgres_local_data:
  redis_data:
  neo4j_data:
  qdrant_data:
